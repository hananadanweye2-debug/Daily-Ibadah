<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Times</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0b0f1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* PHONE UI */
.phone {
  width: 360px;
  height: 720px;
  background: #111827;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* HERO */
.hero {
  height: 45%;
  background: linear-gradient(to top, #111827, transparent),
              url('https://i.imgur.com/8Km9tLL.png') center/cover;
  position: relative;
  color: white;
}

.overlay {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

.hero h1 {
  font-size: 40px;
}

.hero h3 {
  opacity: 0.8;
}

/* BUTTON */
.location-btn {
  margin-top: 10px;
  padding: 8px 12px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: black;
  cursor: pointer;
}

/* CARD */
.card {
  background: #1f2937;
  margin-top: -20px;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  color: white;
  height: 55%;
}

/* PRAYERS */
.prayer {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  background: #374151;
}

.active {
  background: #22c55e;
  color: black;
  font-weight: bold;
}

/* COUNTDOWN */
#countdown {
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="phone">

  <!-- HERO -->
 <div class="hero" onclick="getLocationAndLoad()"  style="cursor:pointer;">
    <div class="overlay">
      <h3 id="currentPrayerName">Tap to enable location</h3>
      <h1 id="currentTime">--:--</h1>
    </div>
  </div>

  <!-- CARD -->
  <div class="card">

    <h3>Today's Prayers</h3>

    <div class="prayer" id="p-fajr"><span>Fajr</span><span id="fajr">--</span></div>
    <div class="prayer" id="p-dhuhr"><span>Dhuhr</span><span id="dhuhr">--</span></div>
    <div class="prayer" id="p-asr"><span>Asr</span><span id="asr">--</span></div>
    <div class="prayer" id="p-maghrib"><span>Maghrib</span><span id="maghrib">--</span></div>
    <div class="prayer" id="p-isha"><span>Isha</span><span id="isha">--</span></div>

    <div id="countdown"></div>

  </div>

</div>

<script>

/* CLOCK */
setInterval(() => {
  const now = new Date();
  document.getElementById("currentTime").textContent =
    now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}, 1000);

/* GET LOCATION ONLY WHEN CLICKED */
function getLocationAndLoad(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      document.getElementById("locationText").textContent =
        `📍 Loading location...`;

      fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
      .then(res => res.json())
      .then(data => {
        updateUI(data.data.timings);
      });

      document.getElementById("locationText").textContent =
        `📍 Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}`;
    });
  }
}

/* UPDATE UI */
function updateUI(t){
  document.getElementById("fajr").textContent = t.Fajr;
  document.getElementById("dhuhr").textContent = t.Dhuhr;
  document.getElementById("asr").textContent = t.Asr;
  document.getElementById("maghrib").textContent = t.Maghrib;
  document.getElementById("isha").textContent = t.Isha;

  highlightCurrentPrayer(t);
  startCountdown(t);
  checkAdhan(t);
}

/* HIGHLIGHT */
function highlightCurrentPrayer(t){
  const now = new Date();

  const prayers = [
    {name:"Fajr", id:"fajr", time:t.Fajr},
    {name:"Dhuhr", id:"dhuhr", time:t.Dhuhr},
    {name:"Asr", id:"asr", time:t.Asr},
    {name:"Maghrib", id:"maghrib", time:t.Maghrib},
    {name:"Isha", id:"isha", time:t.Isha}
  ];

  document.querySelectorAll(".prayer").forEach(p => p.classList.remove("active"));

  for(let i=0; i<prayers.length; i++){
    let [h,m] = prayers[i].time.split(":");
    let pt = new Date();
    pt.setHours(h,m,0);

    if(now < pt){
      if(i > 0){
        document.getElementById("p-" + prayers[i-1].id).classList.add("active");
        document.getElementById("currentPrayerName").textContent = prayers[i-1].name;
      }
      break;
    }
  }
}

/* COUNTDOWN */
function startCountdown(t){
  setInterval(() => {
    const now = new Date();

    const prayers = Object.values(t);
    let next = null;

    prayers.forEach(time => {
      let [h,m] = time.split(":");
      let pt = new Date();
      pt.setHours(h,m,0);

      if(pt > now && !next){
        next = pt;
      }
    });

    if(next){
      let diff = Math.floor((next - now)/1000);
      let h = Math.floor(diff/3600);
      let m = Math.floor((diff%3600)/60);
      let s = diff%60;

      document.getElementById("countdown").textContent =
        `Next prayer in ${h}h ${m}m ${s}s`;
    }
  },1000);
}

/* ADHAN */
const adhan = new Audio("adhan.mp3");

function checkAdhan(times){
  setInterval(() => {
    const now = new Date();
    const current = now.getHours() + ":" + now.getMinutes().toString().padStart(2,'0');

    Object.values(times).forEach(time => {
      if(time === current){
        adhan.play();
        alert("Time for prayer 🕌");
      }
    });
  }, 60000);
}

</script>

</body>
</html>
